name: Deploy AccessPIM to Oracle Cloud

on:
  push:
    branches:
      - main
      - master # Cobre os dois nomes mais comuns

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Compilar o Backend
        working-directory: ./backend
        run: |
          npm install
          npm run build

      - name: Enviar Backend para Oracle Cloud
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "backend/dist/*,backend/package.json"
          target: "/var/www/accesspim/backend"
          strip_components: 1

      - name: Reiniciar API via PM2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/accesspim/backend
            npm install --omit=dev
            pm2 restart accesspim-api || pm2 start dist/server.js --name accesspim-api
            pm2 save

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Compilar o Frontend (Angular)
        working-directory: ./front-end
        run: |
          npm install
          npm run build

      - name: Enviar Frontend para Oracle Cloud
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "front-end/dist/*"
          target: "/var/www/accesspim/frontend"
          strip_components: 2