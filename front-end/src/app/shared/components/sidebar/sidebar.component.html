

<div class="flex h-full transition-all duration-300" [ngClass]="collapsed ? 'w-20' : 'w-64'">
  <div class="flex flex-col justify-between border-e border-gray-800 bg-[#181d23] h-full w-full transition-all duration-300">
    <!-- Botão de toggle -->
    <div class="flex items-center justify-between px-3 pt-4">
      <div class="flex items-center gap-2">
        <img *ngIf="!collapsed" [src]="userPic()" alt="Avatar" class="w-10 h-10 rounded-lg border border-gray-700 shadow" />
        <span *ngIf="!collapsed" class="text-white font-bold text-lg">AP</span>
        <span *ngIf="collapsed" class="grid size-10 place-content-center rounded-lg bg-gray-700 text-xs text-gray-200 font-bold">AP</span>
      </div>
      <button (click)="toggleSidebar()" class="p-2 rounded hover:bg-gray-700 text-gray-300 transition">
        <i class="fa-solid" [ngClass]="collapsed ? 'fa-chevron-right' : 'fa-chevron-left'"></i>
      </button>
    </div>
    <!-- Usuário -->
    <div *ngIf="!collapsed" class="flex flex-col items-center py-4">
      <span class="text-white font-semibold text-base">{{ userName() }}</span>
      <span class="text-xs text-gray-400 uppercase tracking-wider">{{ userCargo() }}</span>
    </div>
    <!-- Menu principal -->
    <ul class="mt-2 space-y-1 flex-1">
      @for (item of menuItems; track item.link) {
        <li>
          <a [routerLink]="item.link" routerLinkActive="bg-gray-700 text-white" class="group flex items-center gap-3 rounded-md px-4 py-2 text-gray-300 hover:bg-gray-700 hover:text-white transition font-medium justify-start" (click)="onNavigate()">
            <i [class]="item.icon + ' w-5 text-lg'" aria-hidden="true"></i>
            <span *ngIf="!collapsed">{{ item.label }}</span>
            <span *ngIf="collapsed" class="invisible absolute start-full top-1/2 ms-4 -translate-y-1/2 rounded bg-gray-900 px-2 py-1.5 text-xs font-medium text-white group-hover:visible">
              {{ item.label }}
            </span>
          </a>
        </li>
      }
      @if (userCargo() === 'ADMIN') {
        <li *ngIf="!collapsed" class="mt-4 mb-1 px-4 text-xs text-gray-500 uppercase tracking-wider">Administração</li>
        @for (item of adminMenuItems; track item.link) {
          <li>
            <a [routerLink]="item.link" routerLinkActive="bg-gray-700 text-white" class="group flex items-center gap-3 rounded-md px-4 py-2 text-gray-300 hover:bg-gray-700 hover:text-white transition font-medium justify-start" (click)="onNavigate()">
              <i [class]="item.icon + ' w-5 text-lg'" aria-hidden="true"></i>
              <span *ngIf="!collapsed">{{ item.label }}</span>
              <span *ngIf="collapsed" class="invisible absolute start-full top-1/2 ms-4 -translate-y-1/2 rounded bg-gray-900 px-2 py-1.5 text-xs font-medium text-white group-hover:visible">
                {{ item.label }}
              </span>
            </a>
          </li>
        }
      }
    </ul>
    <!-- Logout -->
    <div class="mb-6 px-4">
      <a [routerLink]="'/logout'" class="flex items-center gap-3 rounded-md px-4 py-2 text-gray-400 hover:bg-red-600 hover:text-white transition font-medium justify-start">
        <i class="fa-solid fa-sign-out-alt w-5 text-lg"></i>
        <span *ngIf="!collapsed">Sair</span>
        <span *ngIf="collapsed" class="invisible absolute start-full top-1/2 ms-4 -translate-y-1/2 rounded bg-gray-900 px-2 py-1.5 text-xs font-medium text-white group-hover:visible">
          Sair
        </span>
      </a>
    </div>
  </div>
</div>
