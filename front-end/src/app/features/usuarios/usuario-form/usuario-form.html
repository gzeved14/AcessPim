<div class="p-6 max-w-[800px] mx-auto text-slate-200">
  <div class="mb-6">
    <h2 class="m-0 mb-2 text-2xl text-white">Novo Usuário do Sistema</h2>
    <p class="m-0 text-slate-400">Área restrita: Cadastro exclusivo para permissões de sistema.</p>
  </div>

  <div class="bg-[#1d1d1d] rounded-lg p-6 shadow-md">
    @if (errorMessage()) {
      <div class="text-red-500 mb-4 text-sm bg-red-500/10 p-2.5 rounded-md"><i class="fa fa-exclamation-circle"></i> {{ errorMessage() }}</div>
    }

    <form (ngSubmit)="salvar()" #form="ngForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="flex flex-col gap-1.5 md:col-span-2">
        <label class="text-[13px] font-semibold text-slate-300">Nome Completo</label>
        <input type="text" name="nome" [(ngModel)]="usuario.nome" required placeholder="Ex: João da Silva" class="bg-[#2b2b2b] border border-slate-600 text-white px-3 py-2.5 rounded-md font-inherit focus:outline-none focus:border-teal-400">
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-[13px] font-semibold text-slate-300">Matrícula</label>
        <input type="text" name="matricula" [(ngModel)]="usuario.matricula" required placeholder="Ex: MAT-001" class="bg-[#2b2b2b] border border-slate-600 text-white px-3 py-2.5 rounded-md font-inherit focus:outline-none focus:border-teal-400">
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-[13px] font-semibold text-slate-300">E-mail Corporativo</label>
        <input type="email" name="email" [(ngModel)]="usuario.email" required placeholder="email@empresa.com" class="bg-[#2b2b2b] border border-slate-600 text-white px-3 py-2.5 rounded-md font-inherit focus:outline-none focus:border-teal-400">
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-[13px] font-semibold text-slate-300">Senha Provisória</label>
        <input type="password" name="senha" [(ngModel)]="usuario.senha" required minlength="6" placeholder="Mínimo 6 caracteres" class="bg-[#2b2b2b] border border-slate-600 text-white px-3 py-2.5 rounded-md font-inherit focus:outline-none focus:border-teal-400">
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-[13px] font-semibold text-slate-300">Setor / Departamento</label>
        <input type="text" name="setor" [(ngModel)]="usuario.setor" required placeholder="Ex: Segurança" class="bg-[#2b2b2b] border border-slate-600 text-white px-3 py-2.5 rounded-md font-inherit focus:outline-none focus:border-teal-400">
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-[13px] font-semibold text-slate-300">Cargo / Permissão de Acesso</label>
        <select name="cargo" [(ngModel)]="usuario.cargo" required class="bg-[#2b2b2b] border border-slate-600 text-white px-3 py-2.5 rounded-md font-inherit focus:outline-none focus:border-teal-400">
          <option value="OP_DE_SEGURANCA">Operador de Segurança</option>
          <option value="GESTOR_DE_AREA">Gestor de Área</option>
          <option value="ADMIN">Administrador (Acesso Total)</option>
        </select>
      </div>

      <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-[#333] md:col-span-2">
        <button type="button" class="bg-transparent border border-slate-600 text-slate-300 px-5 py-2.5 rounded-md cursor-pointer transition-colors hover:bg-slate-700 disabled:opacity-60 disabled:cursor-not-allowed" (click)="cancelar()" [disabled]="loading()">Cancelar</button>
        <button type="submit" class="bg-teal-400 text-gray-900 border-none px-5 py-2.5 rounded-md cursor-pointer font-semibold transition-colors hover:bg-teal-500 disabled:opacity-60 disabled:cursor-not-allowed" [disabled]="form.invalid || loading()">
          <i class="fa" [class.fa-spinner]="loading()" [class.fa-spin]="loading()" [class.fa-save]="!loading()"></i> 
          {{ loading() ? 'Cadastrando...' : 'Cadastrar Usuário' }}
        </button>
      </div>
    </form>
  </div>
</div>
