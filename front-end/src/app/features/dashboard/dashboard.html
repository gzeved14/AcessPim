<main class="min-h-screen bg-slate-100 p-4 md:p-8">
  <section class="mx-auto max-w-5xl space-y-6">
    <header class="rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
      <div class="flex flex-wrap items-center justify-between gap-4">
        <div>
          <p class="text-sm text-slate-500">Painel principal</p>
          <h1 class="text-2xl font-bold text-slate-900">Ola, {{ userName() }}</h1>
        </div>
        <button
          type="button"
          (click)="onLogout()"
          class="rounded-xl bg-rose-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-rose-700"
        >
          Sair
        </button>
      </div>
    </header>

    <section class="grid gap-4 md:grid-cols-3">
      <button
        type="button"
        (click)="goTo('/colaboradores')"
        class="text-left rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-200 transition hover:-translate-y-0.5 hover:shadow-md"
      >
        <h2 class="text-lg font-semibold text-slate-900">Colaboradores</h2>
        <p class="mt-2 text-sm text-slate-600">Acesse cadastro e gestao de funcionarios.</p>
      </button>

      <button
        type="button"
        (click)="goTo('/areas')"
        class="text-left rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-200 transition hover:-translate-y-0.5 hover:shadow-md"
      >
        <h2 class="text-lg font-semibold text-slate-900">Areas</h2>
        <p class="mt-2 text-sm text-slate-600">Visualize e administre zonas de risco.</p>
      </button>

      <button
        type="button"
        (click)="goTo('/acessos')"
        class="text-left rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-200 transition hover:-translate-y-0.5 hover:shadow-md"
      >
        <h2 class="text-lg font-semibold text-slate-900">Acessos</h2>
        <p class="mt-2 text-sm text-slate-600">Consulte registros e historico de entrada/saida.</p>
      </button>
    </section>
  </section>
</main>
